name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install Elm
        run: npm install -g elm@0.19.1

      - name: Get commit hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Replace commit placeholder
        run: |
          find . -name '*.elm' -type f -exec sed -i 's/"GITHUB_ACTIONS_COMMIT_HASH_PLACEHOLDER"/"${{ env.COMMIT_HASH }}"/g' {} \;

      - name: Build Elm application
        run: elm make src/Main.elm --optimize --output=bundle.js

      - name: Create index.html
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>KaitoTLex.Systems</title>
            </head>
            <body>
              <div id="root"></div>
              <script src="bundle.js"></script>
              <script>Elm.Main.init({ node: document.getElementById("root") });</script>
            </body>
          </html>
          HTMLEOF

      - name: Create 404.html for SPA routing
        run: |
          cat > 404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <script>sessionStorage.redirect = location.pathname; location.replace("/");</script>
            </head>
          </html>
          HTMLEOF

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v30
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
          build-command: 'echo "Build command not needed for static sites"'
          output-directory: .
