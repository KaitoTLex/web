name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'status.json'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install Elm
        run: npm install -g elm@0.19.1

      - name: Get commit hash
        run: echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Replace commit placeholder
        run: |
          find . -name '*.elm' -type f -exec sed -i 's/"GITHUB_ACTIONS_COMMIT_HASH_PLACEHOLDER"/"${{ env.COMMIT_HASH }}"/g' {} \;

      - name: Build Elm application
        run: elm make src/Main.elm --optimize --output=dist/bundle.js

      - name: Create index.html
        run: |
          mkdir -p dist
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>KaitoTLex.Systems</title>
            </head>
            <body>
              <div id="root"></div>
              <script src="bundle.js"></script>
              <script>Elm.Main.init({ node: document.getElementById("root"), flags: new Date().getTimezoneOffset() });</script>
            </body>
          </html>
          HTMLEOF

      - name: Create 404.html for SPA routing
        run: |
          cat > dist/404.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <script>sessionStorage.redirect = location.pathname; location.replace("/");</script>
            </head>
          </html>
          HTMLEOF

      - name: Copy CNAME
        run: cp CNAME dist/CNAME

      - name: Copy static assets
        run: cp -r cont dist/cont

      - name: Copy status data
        run: |
          [ -f status.json ] && cp status.json dist/status.json || echo '{"history":[]}' > dist/status.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
